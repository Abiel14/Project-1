<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Authentication and Work Log</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .container { max-width: 600px; margin: auto; padding: 20px; }
        h2 { text-align: center; }
        form { margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin: 5px 0; }
        button { width: 100%; padding: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>User Authentication</h2>

    <div id="login">
        <h3>Login</h3>
        <form id="loginForm">
            <input type="text" id="loginUsername" placeholder="Username" required>
            <input type="password" id="loginPassword" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </div>

    <div id="signup">
        <h3>Signup</h3>
        <form id="signupForm">
            <input type="text" id="signupUsername" placeholder="Username" required>
            <input type="password" id="signupPassword" placeholder="Password" required>
            <button type="submit">Signup</button>
        </form>
    </div>

    <h2>Work Log</h2>
    <form id="workLogForm">
        <input type="text" id="workLogEntry" placeholder="Log your work here..." required>
        <button type="submit">Add Work Log</button>
    </form>
    <div id="workLogs"></div>
</div>

<script>
    // Functionality for login and signup could be implemented here
    // For example, use local storage to save user data and work logs

    document.getElementById('loginForm').addEventListener('submit', function(event) {
        event.preventDefault();
        // Add login handling code
    });

    document.getElementById('signupForm').addEventListener('submit', function(event) {
        event.preventDefault();
        // Add signup handling code
    });

    document.getElementById('workLogForm').addEventListener('submit', function(event) {
        event.preventDefault();
        // Add work log entry handling code
    });
</script>

</body>
</html>
